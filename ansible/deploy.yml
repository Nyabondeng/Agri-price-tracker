---
- name: Configure and deploy Agri Price Tracker
 hosts: app
 become: true
 vars:
   app_dir: /opt/agri-price-tracker
   app_container_name: agric-price-tracker-app
   app_image: "{{ lookup('env', 'APP_IMAGE') | default('agri-price-tracker:latest', true) }}"
   app_port: "{{ lookup('env', 'APP_PORT') | default('3000', true) }}"
   acr_login_server: "{{ lookup('env', 'ACR_LOGIN_SERVER') | default('', true) }}"
   acr_username: "{{ lookup('env', 'ACR_USERNAME') | default('', true) }}"
   acr_password: "{{ lookup('env', 'ACR_PASSWORD') | default('', true) }}"
   # SSL/Domain configuration
   domain_name: "{{ lookup('env', 'DOMAIN_NAME') | default('agri-price-tracker.duckdns.org', true) }}"
   cert_email: "{{ lookup('env', 'CERT_EMAIL') | default('admin@agri-price-tracker.local', true) }}"
   # App configuration
   app_host: "0.0.0.0"
   app_server_name: "{{ domain_name }}"
   jwt_secret: "{{ lookup('env', 'JWT_SECRET') | default('', true) }}"
   mongodb_container_name: agri-mongodb
   mongodb_network: agri-network


 tasks:
   - name: Update apt cache
     ansible.builtin.apt:
       update_cache: true
       cache_valid_time: 3600


   - name: Install required OS packages
     ansible.builtin.apt:
       name:
         - ca-certificates
         - curl
         - gnupg
         - lsb-release
         - python3-pip
         - nginx
         - certbot
         - python3-certbot-nginx
       state: present


   - name: Ensure Nginx is started and enabled
     ansible.builtin.service:
       name: nginx
       state: started
       enabled: true


   - name: Create certbot renewal script
     ansible.builtin.copy:
       content: |
         #!/bin/bash
         # Auto-renew Let's Encrypt certificates
         # This script is called daily by cron to check for expiring certificates
         certbot renew --quiet --agree-tos --non-interactive
         nginx -s reload 2>/dev/null || systemctl reload nginx
       dest: /usr/local/bin/certbot-renew.sh
       mode: '0755'


   - name: Create cron job for Certbot auto-renewal (daily at 3:30 AM)
     ansible.builtin.cron:
       name: "Auto-renew Let's Encrypt certificates"
       minute: "30"
       hour: "3"
       job: "/usr/local/bin/certbot-renew.sh"
       user: root
       state: present


   - name: Create certbot validation directory
     ansible.builtin.file:
       path: /var/www/certbot
       state: directory
       mode: '0755'


   - name: "Wait for DNS to resolve domain: {{ app_server_name }}"
     shell: |
       for i in {1..60}; do
         if getent hosts "{{ app_server_name }}" > /dev/null 2>&1; then
           echo "DNS resolved for {{ app_server_name }}"
           exit 0
         fi
         echo "Waiting for DNS resolution... (attempt $i/60)"
         sleep 5
       done
       echo "WARNING: DNS did not resolve for {{ app_server_name }} after 5 minutes"
       echo "Certbot may fail if domain is not accessible from internet"
       exit 0
     register: dns_resolution
     changed_when: false


   - name: "Update Nginx configuration to use domain: {{ app_server_name }}"
     ansible.builtin.copy:
       content: |
         # Nginx reverse proxy configuration for Agri Price Tracker
         # This config serves HTTP on port 80 and will be upgraded to HTTPS by Certbot
         server {
           listen 80 default_server;
           listen [::]:80 default_server;
           server_name {{ app_server_name }};


           # Allow .well-known for Let's Encrypt ACME challenges (HTTP-01 validation)
           location /.well-known/acme-challenge/ {
             root /var/www/certbot;
             try_files $uri =404;
           }


           # Redirect all other HTTP traffic to the Node.js app running on 3000
           location / {
             proxy_pass http://localhost:3000;
             proxy_http_version 1.1;
             proxy_set_header Upgrade $http_upgrade;
             proxy_set_header Connection 'upgrade';
             proxy_set_header Host $host;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_cache_bypass $http_upgrade;
           }
         }
       dest: /etc/nginx/sites-available/default
     notify: Reload Nginx


   - name: Test Nginx configuration syntax
     shell: nginx -t
     register: nginx_test_result
     changed_when: false


   - name: Fail if Nginx config is invalid
     fail:
       msg: "Nginx configuration is invalid: {{ nginx_test_result.stderr }}"
     when: nginx_test_result.rc != 0


   - name: Reload Nginx (before certificate request)
     ansible.builtin.service:
       name: nginx
       state: reloaded


   - name: "Request SSL certificate from Let's Encrypt for {{ app_server_name }}"
     shell: |
       set -euo pipefail
      
       # Check if certificate already exists
       if [ -d "/etc/letsencrypt/live/{{ app_server_name }}" ]; then
         echo "Certificate already exists for {{ app_server_name }}"
         exit 0
       fi
      
       echo "Requesting Let's Encrypt certificate for {{ app_server_name }}..."
      
       certbot certonly \
         --nginx \
         --domain "{{ app_server_name }}" \
         --email "{{ cert_email }}" \
         --agree-tos \
         --non-interactive \
         --preferred-challenges http \
         --quiet \
         || {
           echo "WARNING: Certbot failed - certificate may not have been obtained"
           echo "This may be because:"
           echo "1. Domain does not resolve to this public IP"
           echo "2. Port 80 is not accessible from the internet"
           echo "3. DuckDNS is not pointing to the correct IP"
           echo "Continuing deployment with HTTP (no HTTPS yet)..."
           exit 0
         }
     register: certbot_result
     changed_when: "'Successfully received certificate' in certbot_result.stdout or 'already exists' in certbot_result.stdout"
     failed_when: false


   - name: "Configure Nginx HTTPS with certificate (if obtained)"
     ansible.builtin.copy:
       content: |
         # Nginx HTTPS configuration for Agri Price Tracker
         # Configured and managed by Certbot
        
         server {
           listen 80 default_server;
           listen [::]:80 default_server;
           server_name {{ app_server_name }};


           # Let's Encrypt ACME challenge validation
           location /.well-known/acme-challenge/ {
             root /var/www/certbot;
           }


           # Redirect all HTTP to HTTPS
           return 301 https://$server_name$request_uri;
         }


         server {
           listen 443 ssl http2 default_server;
           listen [::]:443 ssl http2 default_server;
           server_name {{ app_server_name }};


           # SSL Certificate and Key (managed by Certbot)
           ssl_certificate /etc/letsencrypt/live/{{ app_server_name }}/fullchain.pem;
           ssl_certificate_key /etc/letsencrypt/live/{{ app_server_name }}/privkey.pem;


           # SSL Configuration (Let's Encrypt best practices)
           ssl_protocols TLSv1.2 TLSv1.3;
           ssl_ciphers HIGH:!aNULL:!MD5;
           ssl_prefer_server_ciphers on;
           ssl_session_cache shared:SSL:10m;
           ssl_session_timeout 10m;


           # Security headers
           add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
           add_header X-Frame-Options "SAMEORIGIN" always;
           add_header X-Content-Type-Options "nosniff" always;
           add_header Referrer-Policy "no-referrer-when-downgrade" always;


           # Reverse proxy configuration
           location / {
             proxy_pass http://localhost:3000;
             proxy_http_version 1.1;
             proxy_set_header Upgrade $http_upgrade;
             proxy_set_header Connection 'upgrade';
             proxy_set_header Host $host;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_cache_bypass $http_upgrade;
           }
         }
       dest: /etc/nginx/sites-available/default
     notify: Reload Nginx
     # Only apply if we got a certificate (this will show as changed if cert was requested)
     when: "'already exists' in certbot_result.stdout or 'Successfully received' in certbot_result.stdout"


   - name: Test final Nginx HTTPS configuration
     shell: nginx -t
     register: nginx_final_test
     changed_when: false


   - name: Fail if final Nginx config is invalid
     fail:
       msg: "Final Nginx configuration is invalid: {{ nginx_final_test.stderr }}"
     when: nginx_final_test.rc != 0


   - name: Create keyrings directory for Docker GPG key
     ansible.builtin.file:
       path: /etc/apt/keyrings
       state: directory
       mode: "0755"


   - name: Add Docker apt repository key
     ansible.builtin.get_url:
       url: https://download.docker.com/linux/ubuntu/gpg
       dest: /etc/apt/keyrings/docker.asc
       mode: "0644"


   - name: Add Docker apt repository
     ansible.builtin.apt_repository:
       repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
       state: present


   - name: Install Docker engine and compose plugin
     ansible.builtin.apt:
       update_cache: true
       name:
         - docker-ce
         - docker-ce-cli
         - containerd.io
         - docker-buildx-plugin
         - docker-compose-plugin
       state: present


   - name: Ensure Docker service is enabled and running
     ansible.builtin.service:
       name: docker
       state: started
       enabled: true


   - name: Ensure app directory exists
     ansible.builtin.file:
       path: "{{ app_dir }}"
       state: directory
       mode: "0755"


   - name: Create Docker network for app and MongoDB
     community.docker.docker_network:
       name: "{{ mongodb_network }}"
       state: present


   - name: Create MongoDB data volume
     community.docker.docker_volume:
       name: agri-mongodb-data
       state: present


   - name: Ensure MongoDB container is running
     community.docker.docker_container:
       name: "{{ mongodb_container_name }}"
       image: mongo:6
       state: started
       restart_policy: unless-stopped
       networks:
         - name: "{{ mongodb_network }}"
       volumes:
         - agri-mongodb-data:/data/db


   - name: Log in to Azure Container Registry when credentials are provided
     community.docker.docker_login:
       registry_url: "{{ acr_login_server }}"
       username: "{{ acr_username }}"
       password: "{{ acr_password }}"
     when:
       - acr_login_server | length > 0
       - acr_username | length > 0
       - acr_password | length > 0


   - name: Pull application image
     community.docker.docker_image_pull:
       name: "{{ app_image }}"


   - name: Ensure app container is running with latest image
     community.docker.docker_container:
       name: "{{ app_container_name }}"
       image: "{{ app_image }}"
       state: started
       restart_policy: unless-stopped
       recreate: true
       pull: always
       networks:
         - name: "{{ mongodb_network }}"
       published_ports:
         - "{{ app_port }}:3000"
       env:
         NODE_ENV: production
         PORT: "3000"
         MONGODB_URI: "mongodb://{{ mongodb_container_name }}:27017/agriprice_ghana"
         JWT_SECRET: "{{ jwt_secret }}"
         JWT_EXPIRES_IN: "7d"
         CLIENT_URL: "https://{{ domain_name }}"
         ALERT_PRICE_CHANGE_PERCENT: "10"


   - name: "Display deployment summary"
     ansible.builtin.debug:
       msg: |
         ========================================
         ✅ DEPLOYMENT COMPLETE!
         ========================================
        
         Application Details:
           - Container: {{ app_container_name }}
           - Image: {{ app_image }}
           - Port: {{ app_port }} (proxied via Nginx)
           - Domain: {{ app_server_name }}
        
         Nginx Configuration:
           - HTTP (port 80): Enabled
           - HTTPS (port 443): {% if 'already exists' in certbot_result.stdout or 'Successfully received' in certbot_result.stdout %}✅ Enabled{% else %}⚠️ Pending (waiting for DNS){% endif %}
        
         SSL Certificate Status:
           - Email: {{ cert_email }}
           - Certbot Renewal: Daily at 3:30 AM
        
         Next Steps:
           1. Verify domain DNS points to this server's public IP
           2. Wait 5-10 minutes for application to start
           3. Access: http://{{ app_server_name }} (will redirect to HTTPS)
           4. Monitor: docker logs {{ app_container_name }}
        
         Deployment triggered by: {{ lookup('env', 'USER') | default('GitHub Actions') }}
         Timestamp: {{ ansible_date_time.iso8601 }}
         ========================================


 handlers:
   - name: Reload Nginx
     ansible.builtin.service:
       name: nginx
       state: reloaded
