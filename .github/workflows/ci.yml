name: CI with DevSecOps Security Scanning

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Code Quality & Tests
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

  # Job 2: Container Image Scanning (Trivy)
  container-scan:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agri-price-tracker:${{ github.sha }} .

      - name: Install Trivy
        run: |
          echo "📦 Installing Trivy vulnerability scanner..."
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Scan Docker image for vulnerabilities
        id: trivy_scan
        run: |
          echo "🔍 Scanning Docker image for vulnerabilities..."
          trivy image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --format table \
            agri-price-tracker:${{ github.sha }} | tee trivy-report.txt
        continue-on-error: true

      - name: Generate detailed JSON report
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format json \
            agri-price-tracker:${{ github.sha }} > trivy-report.json

      - name: Upload Trivy scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: |
            trivy-report.txt
            trivy-report.json
          retention-days: 7

      - name: Check scan results
        if: steps.trivy_scan.outcome == 'failure'
        run: |
          echo "❌ CRITICAL/HIGH vulnerabilities found in container image!"
          echo "Please review the trivy-report artifact for details."
          exit 1

  # Job 3: Infrastructure as Code Scanning (tfsec)
  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if Terraform files exist
        id: check_terraform
        run: |
          if [ -d "terraform" ] && [ "$(ls -A terraform/*.tf 2>/dev/null)" ]; then
            echo "terraform_exists=true" >> $GITHUB_OUTPUT
          else
            echo "terraform_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install tfsec
        if: steps.check_terraform.outputs.terraform_exists == 'true'
        run: |
          echo "📦 Installing tfsec IaC scanner..."
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | sudo bash
          tfsec --version

      - name: Scan Terraform files with tfsec
        if: steps.check_terraform.outputs.terraform_exists == 'true'
        id: tfsec_scan
        run: |
          echo "🔍 Scanning Terraform files for security issues..."
          tfsec terraform/ \
            --minimum-severity CRITICAL \
            --format default \
            --no-colour | tee tfsec-report.txt
        continue-on-error: true

      - name: Generate tfsec JSON report
        if: steps.check_terraform.outputs.terraform_exists == 'true'
        run: |
          tfsec terraform/ \
            --minimum-severity CRITICAL \
            --format json > tfsec-report.json

      - name: Upload tfsec scan report
        if: steps.check_terraform.outputs.terraform_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfsec-iac-report
          path: |
            tfsec-report.txt
            tfsec-report.json
          retention-days: 7

      - name: Check tfsec results
        if: steps.check_terraform.outputs.terraform_exists == 'true' && steps.tfsec_scan.outcome == 'failure'
        run: |
          echo "❌ CRITICAL security issues found in Terraform configuration!"
          echo "Please review the tfsec-report artifact for details."
          exit 1

      - name: No Terraform files found
        if: steps.check_terraform.outputs.terraform_exists == 'false'
        run: |
          echo "⚠️ No Terraform files found - skipping IaC scan"

  # Job 4: Software Composition Analysis (npm audit)
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit for vulnerable dependencies
        id: npm_audit
        run: |
          echo "🔍 Scanning dependencies for vulnerabilities..."
          npm audit --audit-level=critical --production --json > npm-audit-report.json 2>&1 || true
          npm audit --audit-level=critical --production
        continue-on-error: true

      - name: Generate npm audit summary
        run: |
          echo "## 📊 npm Audit Summary" > npm-audit-summary.txt
          echo "" >> npm-audit-summary.txt
          npm audit --audit-level=critical --production --json | jq '.metadata' 2>/dev/null >> npm-audit-summary.txt || echo "No critical vulnerabilities found" >> npm-audit-summary.txt

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: |
            npm-audit-report.json
            npm-audit-summary.txt
          retention-days: 7

      - name: Check npm audit results
        if: steps.npm_audit.outcome == 'failure'
        run: |
          echo "❌ CRITICAL vulnerabilities found in dependencies!"
          echo "Please review the npm-audit-report artifact for details."
          exit 1

  # Job 5: Final Summary & Results
  summary:
    runs-on: ubuntu-latest
    needs: [code-quality, container-scan, iac-scan, dependency-scan]
    if: always()
    steps:
      - name: Generate comprehensive security summary
        run: |
          echo "========================================"
          echo "📊 DEVSECOPS SECURITY SCAN SUMMARY"
          echo "========================================"
          echo ""
          echo "| Scan Type | Status |"
          echo "|-----------|--------|"
          echo "| Code Quality & Tests | ${{ needs.code-quality.result }} |"
          echo "| Container Image (Trivy) | ${{ needs.container-scan.result }} |"
          echo "| Infrastructure as Code (tfsec) | ${{ needs.iac-scan.result }} |"
          echo "| Dependencies (npm audit) | ${{ needs.dependency-scan.result }} |"
          echo ""
          echo "========================================"
          
          # Check if any security scan failed
          if [[ "${{ needs.container-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.iac-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-scan.result }}" == "failure" ]]; then
            echo ""
            echo "❌ SECURITY SCANS FAILED!"
            echo "Critical vulnerabilities detected. Please fix before merging."
            echo ""
            echo "📥 Download the security reports from the Artifacts section below."
            exit 1
          elif [[ "${{ needs.code-quality.result }}" == "failure" ]]; then
            echo ""
            echo "❌ CODE QUALITY FAILED!"
            echo "Please fix linting errors or failing tests."
            exit 1
          else
            echo ""
            echo "✅ ALL SECURITY SCANS PASSED!"
            echo "No critical vulnerabilities detected."
            echo ""
            echo "📥 Security reports are available in the Artifacts section."
          fi

      - name: Upload combined summary
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-summary
          path: security-summary.txt
          retention-days: 7