name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init and validate
        working-directory: terraform
        run: terraform init -backend=false && terraform validate

      - name: Build Docker image
        run: docker build -t agri-price-tracker:${{ github.sha }} .

      - name: Scan Docker image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          image-ref: agri-price-tracker:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '0'

      - name: Scan Terraform with tfsec (fail on CRITICAL)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
          additional_args: --minimum-severity CRITICAL

      - name: Validate ACR and deploy secrets
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_PRIVATE_IP: ${{ secrets.APP_PRIVATE_IP }}
          BASTION_HOST: ${{ secrets.BASTION_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          CAN_PUSH="true"
          CAN_DEPLOY="true"

          # Debug: Show which secrets are set (without exposing values)
          echo "=== Secret Configuration Debug ==="
          echo "ACR_LOGIN_SERVER is set: $([ -z "$ACR_LOGIN_SERVER" ] && echo "NO ❌" || echo "YES ✓")"
          echo "ACR_USERNAME is set: $([ -z "$ACR_USERNAME" ] && echo "NO ❌" || echo "YES ✓")"
          echo "ACR_PASSWORD is set: $([ -z "$ACR_PASSWORD" ] && echo "NO ❌" || echo "YES ✓")"
          echo "SSH_PRIVATE_KEY is set: $([ -z "$SSH_PRIVATE_KEY" ] && echo "NO ❌" || echo "YES ✓")"
          echo "APP_PRIVATE_IP is set: $([ -z "$APP_PRIVATE_IP" ] && echo "NO ❌" || echo "YES ✓")"
          echo "BASTION_HOST is set: $([ -z "$BASTION_HOST" ] && echo "NO ❌" || echo "YES ✓")"
          echo "===================================="

          # ACR secrets are required for image push.
          for var in ACR_LOGIN_SERVER ACR_USERNAME ACR_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is EMPTY. Check GitHub Settings → Secrets and variables → Actions"
              CAN_PUSH="false"
              CAN_DEPLOY="false"
            fi
          done

          USE_BASTION="false"
          DEPLOY_HOST="${APP_HOST:-${APP_PRIVATE_IP:-}}"

          # SSH key is required only for VM deploy, not for image push.
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "::warning::SSH_PRIVATE_KEY is empty. VM deployment will be skipped after image push."
            CAN_DEPLOY="false"
          fi

          if [ -n "${BASTION_HOST:-}" ] && [ -n "${APP_PRIVATE_IP:-}" ]; then
            # Prefer private VM deploy through Bastion when both are provided.
            DEPLOY_HOST="$APP_PRIVATE_IP"
            USE_BASTION="true"
          fi
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::warning::APP_HOST/APP_PRIVATE_IP not set. VM deployment will be skipped after image push."
            CAN_DEPLOY="false"
          fi
          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"
          echo "USE_BASTION=$USE_BASTION" >> "$GITHUB_ENV"
          echo "BASTION_HOST=${BASTION_HOST:-}" >> "$GITHUB_ENV"
          echo "CAN_PUSH=$CAN_PUSH" >> "$GITHUB_ENV"
          echo "CAN_DEPLOY=$CAN_DEPLOY" >> "$GITHUB_ENV"

      - name: Normalize ACR variables
        id: normalize_acr
        if: env.CAN_PUSH == 'true'
        shell: bash
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="$(echo "$REGISTRY" | tr -d '[:space:]')"
          if [[ "$REGISTRY" != *.azurecr.io ]]; then
            echo "::error::ACR_LOGIN_SERVER must end with .azurecr.io"
            exit 1
          fi
          USERNAME="$(echo "${{ secrets.ACR_USERNAME }}" | tr -d '[:space:]')"
          PASSWORD="$(printf '%s' "${{ secrets.ACR_PASSWORD }}" | tr -d '\r')"
          echo "acr_registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "acr_username_clean=$USERNAME" >> "$GITHUB_OUTPUT"
          {
            echo "acr_password_clean<<EOF"
            echo "$PASSWORD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        if: env.CAN_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.normalize_acr.outputs.acr_registry }}
          username: ${{ steps.normalize_acr.outputs.acr_username_clean }}
          password: ${{ steps.normalize_acr.outputs.acr_password_clean }}

      - name: Tag image for ACR
        if: env.CAN_PUSH == 'true'
        run: docker tag agri-price-tracker:${{ github.sha }} ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}

      - name: Push image to ACR
        if: env.CAN_PUSH == 'true'
        shell: bash
        run: |
          IMAGE="${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}"
          docker push "$IMAGE" || (sleep 10 && docker push "$IMAGE")
          # Also tag as latest for cloud-init deployments
          docker tag agri-price-tracker:${{ github.sha }} ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:latest
          docker push "${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:latest"
          echo "IMAGE_URL=$IMAGE" >> "$GITHUB_ENV"

      - name: Mark image push skipped when ACR secrets missing
        if: env.CAN_PUSH != 'true'
        run: |
          echo "Image push skipped because required ACR secrets are missing."
          echo "IMAGE_URL=" >> "$GITHUB_ENV"

      - name: Login to Azure
        if: env.CAN_PUSH == 'true'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Deploy updated container to VM
        if: env.CAN_PUSH == 'true'
        shell: bash
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          VM_NAME: ${{ secrets.VM_NAME }}
          VM_RESOURCE_GROUP: ${{ secrets.VM_RESOURCE_GROUP }}
          ACR_REGISTRY: ${{ steps.normalize_acr.outputs.acr_registry }}
          ACR_USERNAME: ${{ steps.normalize_acr.outputs.acr_username_clean }}
          ACR_PASSWORD: ${{ steps.normalize_acr.outputs.acr_password_clean }}
        run: |
          if [ -z "$VM_NAME" ] || [ -z "$VM_RESOURCE_GROUP" ]; then
            echo "::warning::VM_NAME or VM_RESOURCE_GROUP secret not set. Skipping auto-deployment."
            echo "Add VM_NAME and VM_RESOURCE_GROUP secrets to enable zero-touch deployment."
            exit 0
          fi

          DOMAIN="${DOMAIN_NAME:-agri-price-tracker.duckdns.org}"
          # Use SHA-tagged image to bypass Docker cache and guarantee fresh deployment
          IMAGE="$ACR_REGISTRY/agri-price-tracker:${{ github.sha }}"

          echo "Deploying $IMAGE to $VM_NAME..."

          az vm run-command invoke \
            --resource-group "$VM_RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "
              set -e
              echo '$ACR_PASSWORD' | docker login '$ACR_REGISTRY' -u '$ACR_USERNAME' --password-stdin
              docker pull '$IMAGE'
              docker stop agric-price-tracker-app 2>/dev/null || true
              docker rm agric-price-tracker-app 2>/dev/null || true
              docker run -d \
                --name agric-price-tracker-app \
                --restart unless-stopped \
                --network agri-network \
                -e NODE_ENV=production \
                -e PORT=3000 \
                -e MONGODB_URI=mongodb://agri-mongodb:27017/agriprice_ghana \
                -e JWT_SECRET='$JWT_SECRET' \
                -e JWT_EXPIRES_IN=7d \
                -e CLIENT_URL=https://$DOMAIN \
                -e ALERT_PRICE_CHANGE_PERCENT=10 \
                -p 3000:3000 \
                '$IMAGE'
              echo 'Deployment complete!'
            "
          echo "✓ Container updated on $VM_NAME"

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "Deployment Status"
          echo "=========================================="
          echo "✓ Docker image built and pushed to ACR"
          echo "✓ Container updated on VM (if Azure secrets configured)"
          echo "=========================================="
