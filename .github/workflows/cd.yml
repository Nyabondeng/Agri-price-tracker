name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init and validate
        working-directory: terraform
        run: terraform init -backend=false && terraform validate

      - name: Build Docker image
        run: docker build -t agri-price-tracker:${{ github.sha }} .

      - name: Scan Docker image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          image-ref: agri-price-tracker:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'

      - name: Scan Terraform with tfsec (fail on CRITICAL)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          additional_args: --minimum-severity CRITICAL

      - name: Validate ACR and deploy secrets
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          APP_PRIVATE_IP: ${{ secrets.APP_PRIVATE_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for var in ACR_LOGIN_SERVER ACR_USERNAME ACR_PASSWORD APP_PRIVATE_IP SSH_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is empty"
              exit 1
            fi
          done

      - name: Normalize ACR variables
        shell: bash
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="$(echo "$REGISTRY" | tr -d '[:space:]')"
          if [[ "$REGISTRY" != *.azurecr.io ]]; then
            echo "::error::ACR_LOGIN_SERVER must end with .azurecr.io"
            exit 1
          fi
          USERNAME="$(echo "${{ secrets.ACR_USERNAME }}" | tr -d '[:space:]')"
          PASSWORD="$(printf '%s' "${{ secrets.ACR_PASSWORD }}" | tr -d '\r')"
          echo "ACR_REGISTRY=$REGISTRY" >> "$GITHUB_ENV"
          echo "ACR_USERNAME_CLEAN=$USERNAME" >> "$GITHUB_ENV"
          {
            echo "ACR_PASSWORD_CLEAN<<EOF"
            echo "$PASSWORD"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME_CLEAN }}
          password: ${{ env.ACR_PASSWORD_CLEAN }}

      - name: Tag image for ACR
        run: docker tag agri-price-tracker:${{ github.sha }} ${{ env.ACR_REGISTRY }}/agri-price-tracker:${{ github.sha }}

      - name: Push image to ACR
        shell: bash
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/agri-price-tracker:${{ github.sha }}"
          docker push "$IMAGE" || (sleep 10 && docker push "$IMAGE")

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible, Docker SDK, and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker
          ansible-galaxy collection install community.docker

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate Ansible inventory from secrets
        shell: bash
        env:
          APP_IP: ${{ secrets.APP_PRIVATE_IP }}
          BASTION_IP: ${{ secrets.BASTION_IP }}
        run: |
          set -euo pipefail
          {
            echo "[app]"
            if [ -n "${BASTION_IP:-}" ]; then
              echo "app_vm ansible_host=${APP_IP} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=azureuser@${BASTION_IP}'"
            else
              echo "app_vm ansible_host=${APP_IP} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa"
            fi
          } > ansible/inventory.ini

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          APP_IMAGE: ${{ env.ACR_REGISTRY }}/agri-price-tracker:${{ github.sha }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
