name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init and validate
        working-directory: terraform
        run: terraform init -backend=false && terraform validate

      - name: Build Docker image
        run: docker build -t agri-price-tracker:${{ github.sha }} .

      - name: Scan Docker image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          image-ref: agri-price-tracker:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'

      - name: Scan Terraform with tfsec (fail on CRITICAL)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          additional_args: --minimum-severity CRITICAL

      - name: Validate ACR and deploy secrets
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_PRIVATE_IP: ${{ secrets.APP_PRIVATE_IP }}
          BASTION_HOST: ${{ secrets.BASTION_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          # ACR secrets are required for image push.
          for var in ACR_LOGIN_SERVER ACR_USERNAME ACR_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is empty"
              exit 1
            fi
          done

          USE_BASTION="false"
          CAN_DEPLOY="true"
          DEPLOY_HOST="${APP_HOST:-${APP_PRIVATE_IP:-}}"

          # SSH key is required only for VM deploy, not for image push.
          if [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "::warning::SSH_PRIVATE_KEY is empty. VM deployment will be skipped after image push."
            CAN_DEPLOY="false"
          fi

          if [ -n "${BASTION_HOST:-}" ] && [ -n "${APP_PRIVATE_IP:-}" ]; then
            # Prefer private VM deploy through Bastion when both are provided.
            DEPLOY_HOST="$APP_PRIVATE_IP"
            USE_BASTION="true"
          fi
          if [ -z "${DEPLOY_HOST:-}" ]; then
            echo "::warning::APP_HOST/APP_PRIVATE_IP not set. VM deployment will be skipped after image push."
            CAN_DEPLOY="false"
          fi
          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"
          echo "USE_BASTION=$USE_BASTION" >> "$GITHUB_ENV"
          echo "BASTION_HOST=${BASTION_HOST:-}" >> "$GITHUB_ENV"
          echo "CAN_DEPLOY=$CAN_DEPLOY" >> "$GITHUB_ENV"

      - name: Normalize ACR variables
        id: normalize_acr
        shell: bash
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="$(echo "$REGISTRY" | tr -d '[:space:]')"
          if [[ "$REGISTRY" != *.azurecr.io ]]; then
            echo "::error::ACR_LOGIN_SERVER must end with .azurecr.io"
            exit 1
          fi
          USERNAME="$(echo "${{ secrets.ACR_USERNAME }}" | tr -d '[:space:]')"
          PASSWORD="$(printf '%s' "${{ secrets.ACR_PASSWORD }}" | tr -d '\r')"
          echo "acr_registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "acr_username_clean=$USERNAME" >> "$GITHUB_OUTPUT"
          {
            echo "acr_password_clean<<EOF"
            echo "$PASSWORD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.normalize_acr.outputs.acr_registry }}
          username: ${{ steps.normalize_acr.outputs.acr_username_clean }}
          password: ${{ steps.normalize_acr.outputs.acr_password_clean }}

      - name: Tag image for ACR
        run: docker tag agri-price-tracker:${{ github.sha }} ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}

      - name: Push image to ACR
        shell: bash
        run: |
          IMAGE="${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}"
          docker push "$IMAGE" || (sleep 10 && docker push "$IMAGE")

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible, Docker SDK, and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker
          ansible-galaxy collection install community.docker

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate Ansible inventory from secrets
        shell: bash
        run: |
          set -euo pipefail
          SSH_ARGS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          if [ "${USE_BASTION:-false}" = "true" ]; then
            SSH_ARGS="-o ProxyJump=azureuser@${BASTION_HOST} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            echo "Using Bastion jump host ${BASTION_HOST} to reach private VM ${DEPLOY_HOST}."
          fi
          {
            echo "[app]"
            echo "app_vm ansible_host=${DEPLOY_HOST} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='${SSH_ARGS}'"
          } > ansible/inventory.ini

      - name: Check SSH reachability to deploy host
        id: ssh_check
        shell: bash
        run: |
          set -euo pipefail
          if [ "${CAN_DEPLOY:-false}" != "true" ]; then
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHECK_HOST="${DEPLOY_HOST}"
          if [ "${USE_BASTION:-false}" = "true" ]; then
            CHECK_HOST="${BASTION_HOST}"
          fi
          if ! timeout 8 bash -c "</dev/tcp/${CHECK_HOST}/22" 2>/dev/null; then
            echo "::warning::Cannot reach ${CHECK_HOST}:22 from GitHub-hosted runner. Skipping Ansible deploy."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with Ansible
        if: steps.ssh_check.outputs.can_deploy == 'true'
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          APP_IMAGE: ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml

      - name: Mark deploy skipped when host unreachable
        if: steps.ssh_check.outputs.can_deploy != 'true'
        run: |
          echo "Deployment skipped because SSH host is not reachable from GitHub-hosted runners."
