name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init and validate
        working-directory: terraform
        run: terraform init -backend=false && terraform validate

      - name: Build Docker image
        run: docker build -t agri-price-tracker:${{ github.sha }} .

      - name: Scan Docker image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          image-ref: agri-price-tracker:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'

      - name: Scan Terraform with tfsec (fail on CRITICAL)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          additional_args: --minimum-severity CRITICAL

      - name: Validate ACR and deploy secrets
        shell: bash
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          APP_HOST: ${{ secrets.APP_HOST }}
          APP_PRIVATE_IP: ${{ secrets.APP_PRIVATE_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          for var in ACR_LOGIN_SERVER ACR_USERNAME ACR_PASSWORD SSH_PRIVATE_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is empty"
              exit 1
            fi
          done
          DEPLOY_HOST="${APP_HOST:-${APP_PRIVATE_IP:-}}"
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::error::Set APP_HOST (preferred) or APP_PRIVATE_IP in repository secrets"
            exit 1
          fi
          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"

      - name: Normalize ACR variables
        id: normalize_acr
        shell: bash
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="$(echo "$REGISTRY" | tr -d '[:space:]')"
          if [[ "$REGISTRY" != *.azurecr.io ]]; then
            echo "::error::ACR_LOGIN_SERVER must end with .azurecr.io"
            exit 1
          fi
          USERNAME="$(echo "${{ secrets.ACR_USERNAME }}" | tr -d '[:space:]')"
          PASSWORD="$(printf '%s' "${{ secrets.ACR_PASSWORD }}" | tr -d '\r')"
          echo "acr_registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "acr_username_clean=$USERNAME" >> "$GITHUB_OUTPUT"
          {
            echo "acr_password_clean<<EOF"
            echo "$PASSWORD"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.normalize_acr.outputs.acr_registry }}
          username: ${{ steps.normalize_acr.outputs.acr_username_clean }}
          password: ${{ steps.normalize_acr.outputs.acr_password_clean }}

      - name: Tag image for ACR
        run: docker tag agri-price-tracker:${{ github.sha }} ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}

      - name: Push image to ACR
        shell: bash
        run: |
          IMAGE="${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}"
          docker push "$IMAGE" || (sleep 10 && docker push "$IMAGE")

      - name: Tag image as latest
        run: |
          docker tag agri-price-tracker:${{ github.sha }} ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:latest

      - name: Push latest tag to ACR
        shell: bash
        run: |
          IMAGE="${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:latest"
          docker push "$IMAGE" || (sleep 10 && docker push "$IMAGE")

      - name: Deploy to Azure App Service
        id: app_service_deploy
        shell: bash
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP_NAME }}
          APP_SERVICE_NAME: ${{ secrets.APP_SERVICE_NAME }}
          ACR_LOGIN_SERVER: ${{ steps.normalize_acr.outputs.acr_registry }}
        run: |
          set -euo pipefail
          # Validate required secrets for App Service deployment
          for var in AZURE_SUBSCRIPTION_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET AZURE_TENANT_ID RESOURCE_GROUP APP_SERVICE_NAME ACR_LOGIN_SERVER; do
            if [ -z "${!var}" ]; then
              echo "::warning::Skipping App Service deployment: Required secret $var is empty or not set"
              echo "app_service_url=not-deployed" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          
          # Login to Azure
          az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID" || {
            echo "::warning::Azure login failed, skipping App Service deployment"
            echo "app_service_url=not-deployed" >> "$GITHUB_OUTPUT"
            exit 0
          }
          
          # Set subscription context
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          
          # Update App Service Docker settings to pull latest image
          echo "Configuring App Service to pull latest image from ACR..."
          az webapp config container set \
            --resource-group "$RESOURCE_GROUP" \
            --name "$APP_SERVICE_NAME" \
            --docker-custom-image-name "${ACR_LOGIN_SERVER}/agri-price-tracker:latest" \
            --docker-registry-server-url "https://${ACR_LOGIN_SERVER}" \
            --docker-registry-server-username "$AZURE_CLIENT_ID" \
            --docker-registry-server-password "$AZURE_CLIENT_SECRET" || {
            echo "::warning::Failed to configure App Service container, it may already be running latest."
          }
          
          # Restart App Service to pull new image
          echo "Restarting App Service to deploy latest image..."
          az webapp restart --resource-group "$RESOURCE_GROUP" --name "$APP_SERVICE_NAME"
          
          # Wait for restart
          sleep 15
          
          # Get App Service URL
          APP_URL=$(az webapp show --resource-group "$RESOURCE_GROUP" --name "$APP_SERVICE_NAME" --query "defaultHostName" -o tsv)
          APP_SERVICE_URL="https://${APP_URL}"
          echo "app_service_url=${APP_SERVICE_URL}" >> "$GITHUB_OUTPUT"
          echo "✅ App Service deployed successfully at: ${APP_SERVICE_URL}"

      - name: Output App Service deployment status
        if: success()
        run: |
          echo "📦 Deployment Summary:"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "ACR Image: ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:latest"
          if [ "${{ steps.app_service_deploy.outputs.app_service_url }}" != "not-deployed" ]; then
            echo "🌐 Live Website: ${{ steps.app_service_deploy.outputs.app_service_url }}"
          fi

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible, Docker SDK, and collections
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker
          ansible-galaxy collection install community.docker

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate Ansible inventory from secrets
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "[app]"
            echo "app_vm ansible_host=${DEPLOY_HOST} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'"
          } > ansible/inventory.ini

      - name: Check SSH reachability to deploy host
        id: ssh_check
        shell: bash
        run: |
          set -euo pipefail
          if ! timeout 8 bash -c "</dev/tcp/${DEPLOY_HOST}/22" 2>/dev/null; then
            echo "::warning::Cannot reach ${DEPLOY_HOST}:22 from GitHub-hosted runner. Skipping Ansible deploy. Use a publicly reachable APP_HOST or run CD on a self-hosted runner inside Azure VNet."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy with Ansible
        if: steps.ssh_check.outputs.can_deploy == 'true'
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          APP_IMAGE: ${{ steps.normalize_acr.outputs.acr_registry }}/agri-price-tracker:${{ github.sha }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml

      - name: Mark deploy skipped when host unreachable
        if: steps.ssh_check.outputs.can_deploy != 'true'
        run: |
          echo "Deployment skipped because SSH host is not reachable from GitHub-hosted runners."
