name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t agri-price-tracker:${{ github.sha }} .

      - name: Scan Docker image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          image-ref: agri-price-tracker:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'

      - name: Scan Terraform with tfsec (fail on CRITICAL)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          additional_args: --minimum-severity CRITICAL

      - name: Validate ACR secrets
        shell: bash
        run: |
          test -n "${{ secrets.ACR_LOGIN_SERVER }}"
          test -n "${{ secrets.ACR_USERNAME }}"
          test -n "${{ secrets.ACR_PASSWORD }}"

      - name: Normalize ACR variables
        shell: bash
        run: |
          REGISTRY="${{ secrets.ACR_LOGIN_SERVER }}"
          REGISTRY="${REGISTRY#https://}"
          REGISTRY="${REGISTRY#http://}"
          REGISTRY="$(echo "$REGISTRY" | tr -d '[:space:]')"
          if [[ "$REGISTRY" != *.azurecr.io ]]; then
            echo "::error::ACR_LOGIN_SERVER must end with .azurecr.io"
            exit 1
          fi
          USERNAME="$(echo "${{ secrets.ACR_USERNAME }}" | tr -d '[:space:]')"
          PASSWORD="$(printf '%s' "${{ secrets.ACR_PASSWORD }}" | tr -d '\r')"
          echo "ACR_REGISTRY=$REGISTRY" >> "$GITHUB_ENV"
          echo "ACR_USERNAME_CLEAN=$USERNAME" >> "$GITHUB_ENV"
          {
            echo "ACR_PASSWORD_CLEAN<<EOF"
            echo "$PASSWORD"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME_CLEAN }}
          password: ${{ env.ACR_PASSWORD_CLEAN }}

      - name: Tag image for ACR
        run: docker tag agri-price-tracker:${{ github.sha }} ${{ env.ACR_REGISTRY }}/agri-price-tracker:${{ github.sha }}

      - name: Push image to ACR
        shell: bash
        run: |
          IMAGE="${{ env.ACR_REGISTRY }}/agri-price-tracker:${{ github.sha }}"
          docker push "$IMAGE" || (sleep 10 && docker push "$IMAGE")

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and Docker Python SDK
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate Ansible inventory from secrets
        shell: bash
        run: |
          cat > ansible/inventory.ini <<EOF
          [app]
          app_vm ansible_host=${{ secrets.APP_PRIVATE_IP }} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          APP_IMAGE: ${{ env.ACR_REGISTRY }}/agri-price-tracker:${{ github.sha }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
