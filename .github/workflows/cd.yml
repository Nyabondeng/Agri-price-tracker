name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t agri-price-tracker:${{ github.sha }} .

      - name: Scan Docker image with Trivy (fail on CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: agri-price-tracker:${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: '1'

      - name: Scan Terraform with tfsec (fail on CRITICAL)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          additional_args: --minimum-severity CRITICAL

      - name: Validate ACR secrets
        shell: bash
        run: |
          test -n "${{ secrets.ACR_LOGIN_SERVER }}"
          test -n "${{ secrets.ACR_USERNAME }}"
          test -n "${{ secrets.ACR_PASSWORD }}"

      - name: Log in to Azure Container Registry
        shell: bash
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_LOGIN_SERVER }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Tag image for ACR
        run: docker tag agri-price-tracker:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/agri-price-tracker:${{ github.sha }}

      - name: Push image to ACR
        shell: bash
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/agri-price-tracker:${{ github.sha }}"
          docker push "$IMAGE" || (sleep 10 && docker push "$IMAGE")

      - name: Set up Python for Ansible
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible and Docker Python SDK
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Generate Ansible inventory from secrets
        shell: bash
        run: |
          cat > ansible/inventory.ini <<EOF
          [app]
          app_vm ansible_host=${{ secrets.APP_PRIVATE_IP }} ansible_user=azureuser ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

      - name: Deploy with Ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          APP_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/agri-price-tracker:${{ github.sha }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
